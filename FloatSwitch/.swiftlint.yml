# SwiftLint 設定 (v0.63.2)
# https://github.com/realm/SwiftLint

# チェック対象
included:
  - FloatSwitch
  - Models
  - Services
  - Utilities
  - Views

# テストコードは除外
excluded:
  - FloatSwitchTests
  - FloatSwitchUITests

# 無効化するルール
disabled_rules:
  - trailing_whitespace      # Xcode が自動で扱うため

# オプトインするルール（デフォルト無効だが有用なもの）
opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - overridden_super_call

# 行の長さ（SwiftUI のコードは長くなりがち）
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

# ファイルの長さ
file_length:
  warning: 400
  error: 600

# 関数の長さ
function_body_length:
  warning: 60
  error: 100

# 型の長さ
type_body_length:
  warning: 300
  error: 500

# 識別子の名前
identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
